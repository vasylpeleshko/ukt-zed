services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: uktzed-postgres
    environment:
      POSTGRES_USER: uktzed
      POSTGRES_PASSWORD: uktzed
      POSTGRES_DB: uktzed
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
